spring:
  application:
    name: taskflow-calendar

  datasource:
    url: jdbc:postgresql://localhost:5432/taskflow
    username: taskflow
    password: taskflow123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # 테이블 자동 생성/수정 (개발 환경)
    show-sql: true # SQL 로그 출력
    properties:
      hibernate:
        format_sql: true # SQL 포맷팅
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.taskflow: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.type.descriptor.sql.BasicExtractor: TRACE

jwt:
  secret: taskflow-calendar-secret-key-change-this-in-production-256-bits
  expiration: 86400000  # 24 hours in ms

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: http://localhost:8080/api/oauth/google/callback
    scope: openid https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/calendar.events
    authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
    token-uri: https://oauth2.googleapis.com/token

gemini:
  summary:
    api-key: ${GEMINI_SUMMARY_API_KEY:}
    model: ${GEMINI_SUMMARY_MODEL:gemini-3.1-flash-lite-preview}
    base-url: https://generativelanguage.googleapis.com/v1beta
    timeout-seconds: 20
    temperature: ${GEMINI_SUMMARY_TEMPERATURE:1.0}
    top-k: ${GEMINI_SUMMARY_TOP_K:20}
    top-p: ${GEMINI_SUMMARY_TOP_P:0.8}
  recommendation:
    api-key: ${GEMINI_RECOMMENDATION_API_KEY:}
    model: ${GEMINI_RECOMMENDATION_MODEL:gemini-3.1-flash-lite-preview}
    base-url: https://generativelanguage.googleapis.com/v1beta
    timeout-seconds: 20
    temperature: 0.2
  search:
    api-key: ${GEMINI_SEARCH_API_KEY:}
    model: ${GEMINI_SEARCH_MODEL:gemini-3.1-flash-lite-preview}
    base-url: https://generativelanguage.googleapis.com/v1beta
    timeout-seconds: 20
    temperature: 0.2

summary:
  force-live-enabled: ${WEEKLY_SUMMARY_FORCE_LIVE_ENABLED:false}
  cache:
    enabled: ${WEEKLY_SUMMARY_CACHE_ENABLED:false}
    redis-url: ${REDIS_URL:}
    ttl-seconds: ${WEEKLY_SUMMARY_CACHE_TTL_SECONDS:259200}
